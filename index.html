<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I Love Bunny Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">
  <style>
    /* Body & background */
    body {
      font-family: 'grand hotel', cursive;
      margin: 0;
      height: 100vh;
      background-color: #b8e48a;
      background-image: url('Background.png');
      background-size: cover; /* fills page while keeping aspect ratio */
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* General container styling */
    #question-container, #result-container, #name-container {
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      width: 250px;
      margin-top: 100px; /* moves container down */
      box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    }

    /* Buttons */
    button {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 10px;
      background-color: pink;
      border: none;
      cursor: pointer;
      font-size: 16px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
      transition: 0.2s;
    }

    button:hover {
      background-color: lightpink;
      transform: scale(1.05);
    }

    /* Scoreboard */
    #scoreboard {
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      width: 200px;
      margin-top: 20px; /* moves scoreboard down */
      box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    }

    #scoreboard h3 {
      margin-top: 0;
    }

    ul {
      list-style: none;
      padding-left: 0;
    }
  </style>
</head>
<body>

  <!-- Name Input -->
  <div id="name-container">
    <p>Enter your name to start:</p>
    <input type="text" id="player-name" placeholder="Your name">
    <button onclick="submitName()">Continue</button>
  </div>

  <!-- Start Button -->
  <button id="start-btn" onclick="startQuiz()" style="display:none;">Start Quiz</button>

  <!-- Question Container -->
  <div id="question-container" style="display:none;">
    <p id="question"></p>
    <div id="options"></div>
  </div>

  <!-- Result Container -->
  <div id="result-container" style="display:none;">
    <p id="score"></p>
    <button onclick="restartQuiz()">Play Again</button>
  </div>

  <!-- Scoreboard -->
  <div id="scoreboard">
    <h3>Scoreboard</h3>
    <ul id="score-list"></ul>
  </div>

<script>
  let playerName = "";
  let currentQuestion = 0;
  let score = 0;

  const questions = [
    { question: "What is Bunny's favorite color?", options: ["Pink","Yellow","Purple","Blue"], answer: "Pink" },
    { question: "What is Bunny's favorite flower?", options: ["Bird of Paradise","Lily","Tulip","Sunflower"], answer: "Bird of Paradise" },
    { question: "What is Bunny's favorite hobby?", options: ["Coding","Drawing","Playing piano","Swimming"], answer: "Coding" },
    { question: "What does Bunny go to eat?", options: ["Pasta","Pizza","Curry","Tofu"], answer: "Curry" },
    { question: "What is Bunny's favorite animal?", options: ["Cats","Dogs","Bunnies","Birds"], answer: "Cats" },
    { question: "What does Bunny hate the most?", options: ["Capitalism","Cleaning","Work","Spicy Food"], answer: "Capitalism" }
  ];

  function submitName() {
    const input = document.getElementById("player-name");
    if(input.value.trim() === "") {
      alert("Please enter your name!");
      return;
    }
    playerName = input.value.trim();
    document.getElementById("name-container").style.display = "none";
    document.getElementById("start-btn").style.display = "block";
  }

  function startQuiz() {
    document.getElementById("start-btn").style.display = "none";
    document.getElementById("question-container").style.display = "block";
    currentQuestion = 0;
    score = 0;
    showQuestion();
  }

  function showQuestion() {
    const q = questions[currentQuestion];
    document.getElementById("question").textContent = `${playerName}, ${q.question}`;
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    q.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.textContent = opt;
      btn.onclick = () => selectOption(opt);
      optionsDiv.appendChild(btn);
    });
  }

  function selectOption(option) {
    if(option === questions[currentQuestion].answer) score++;
    currentQuestion++;
    if(currentQuestion < questions.length) showQuestion();
    else showResult();
  }

  function showResult() {
    document.getElementById("question-container").style.display = "none";
    const resultContainer = document.getElementById("result-container");
    resultContainer.style.display = "block";

    let message = "";
    if(score <= 1) message = "You hate Bunny!!";
    else if(score <= 2) message = "Damn, did you even try to know Bunny?";
    else if(score <= 4) message = "You like Bunny but you don’t love Bunny";
    else message = "GOD DAMN YOU + BUNNY = BFF";

    document.getElementById("score").textContent = `${playerName}, your score: ${score}/${questions.length} - ${message}`;

    // Add to scoreboard
    const li = document.createElement("li");
    li.textContent = `${playerName}: ${score}/${questions.length}`;
    document.getElementById("score-list").appendChild(li);
  }

  function restartQuiz() {
    document.getElementById("result-container").style.display = "none";
    document.getElementById("name-container").style.display = "block";
    document.getElementById("player-name").value = "";
  }
</script>

</body>

</html>
